            // Google Docs (41-60)
            { id: 41, q: "ข้อใดคือความสามารถเด่นของ Google Docs เมื่อเทียบกับโปรแกรมแก้ไขเอกสารออฟไลน์ทั่วไป", options: ["มีฟอนต์มาตรฐานสวยงามเยอะกว่า", "ทำงานร่วมกันแก้ไขเนื้อหาได้หลายคนพร้อมกันแบบเรียลไทม์", "พิมพ์คำได้เร็วและไม่มีการพิมพ์ผิดเลย", "ไม่ต้องใช้แป้นพิมพ์ในการทำงานพิมพ์"], answer: 1 },
            { id: 42, q: "หากต้องการดูรายละเอียดประวัติการแก้ไขเอกสารย้อนหลังว่าใครเปลี่ยนข้อความตรงไหน ต้องเลือกเมนูใด", options: ["ไฟล์ > ประวัติเวอร์ชัน", "แก้ไข > ค้นหาและแทนที่", "แทรก > ความคิดเห็น", "เครื่องมือ > จำนวนคำ"], answer: 0 },
            { id: 43, q: "การส่งออกงานเขียนจาก Google Docs เพื่อนำไปเปิดในโปรแกรม Microsoft Word ต้องบันทึกเป็นนามสกุลใด", options: [".pdf", ".txt", ".docx", ".csv"], answer: 2 },

            { id: 47, q: "การเชื่อมโยงข้อความในเอกสารไปยังที่อยู่อีเมลหรือเว็บลิงก์ภายนอก เรียกว่าการใช้งานสิ่งใด", options: ["บุ๊กมาร์ก", "ไฮเปอร์ลิงก์ (Hyperlink)", "ป้ายกำกับข้อความ", "สารบัญลิงก์"], answer: 1 },

            { id: 49, q: "ขั้นตอนในการแปลงไฟล์ภาพหรือไฟล์เอกสาร PDF เป็นข้อความตัวอักษรใน Google Docs สามารถทำได้โดยวิธีใด", options: ["เปิดไฟล์ PDF ด้วย Google Docs ผ่าน Google Drive โดยตรง", "พิมพ์ไฟล์ใหม่ทั้งหมดด้วยแป้นพิมพ์คอมพิวเตอร์", "ใช้การแปลภาษาเพื่อคัดลอกรูปภาพมาพิมพ์", "ใช้เครื่องมือสำรวจค้นหารูปภาพแบบข้อความ"], answer: 0 },

            { id: 52, q: "การใส่ สัญลักษณ์คณิตศาสตร์ และ สัญลักษณ์พิเศษต่างๆ ที่ไม่มีอยู่บนคีย์บอร์ดทั่วไป ต้องใช้เมนูใดใน Docs", options: ["แทรก > อักขระพิเศษ", "เครื่องมือ > ตัวสะกดสัญลักษณ์", "รูปแบบ > การนำเสนออักษรย่อ", "แก้ไข > สัญลักษณ์พิเศษ"], answer: 0 },
            { id: 53, q: "หากต้องการจัดหน้ากระดาษให้เปลี่ยนจากแนวตั้งเป็นแนวนอนเฉพาะบางหน้าในเอกสารเดียวกัน ต้องตั้งค่าที่เมนูใด", options: ["ไฟล์ > ตั้งค่าหน้ากระดาษ", "รูปแบบ > การตั้งค่าตัวอักษร", "แทรก > ส่วนเปลี่ยนทิศทาง", "เครื่องมือ > ตรวจหน้ากระดาษ"], answer: 0 },

            { id: 59, q: "หากต้องการกำหนดขนาดขอบกระดาษ (Margin) ทั้งบน ล่าง ซ้าย ขวา ใน Google Docs ต้องเข้าไปตั้งค่าที่เมนูใด", options: ["ไฟล์ > ตั้งค่าหน้ากระดาษ", "รูปแบบ > ระยะห่างบรรทัด", "แทรก > ตัวแบ่งคอลัมน์", "เครื่องมือ > การตั้งค่ามาตรฐาน"], answer: 0 },

            { id: 78, q: "คีย์ลัดที่ใช้ในการเริ่มหน้าการนำเสนอสไลด์เต็มหน้าจอจากหน้าแรกสุด (Slide show) คือข้อใด", options: ["Ctrl + F5", "Ctrl + P", "Ctrl + Shift + S", "Alt + Enter"], answer: 0 },

            // Google Calendar (81-90)
            { id: 81, q: "เป้าหมายและประโยชน์หลักที่เห็นชัดเจนที่สุดของการเปิดระบบ Google Calendar ในสถาบันการศึกษาคือข้อใด", options: ["ช่วยแต่งพิมพ์เอกสารกลุ่มได้สวยงามโดดเด่น", "ช่วยจัดระเบียบตารางเรียน ติดตามนัดหมาย และลงบันทึกเวลาจัดกิจกรรมการสอน", "ใช้สำหรับรวบรวมแผนที่เดินทางของโรงเรียนไปหาผู้เรียน", "จัดทำสรุปแผนภาพสถิติ"], answer: 1 },
            { id: 82, q: "การเทียบส่งสิทธิ์เชิญคนมาร่วมกิจกรรมประชุมกลุ่มผ่านหน้าจอปฏิทิน ทำได้โดยการพิมพ์ข้อมูลใดของผู้เข้าร่วม", options: ["ชื่อเล่นและชั้นเรียน", "เบอร์โทรศัพท์บ้านส่วนตัว", "ที่อยู่อีเมลหลักของผู้ใช้ปลายทาง", "สกรีนเนมของเครือข่ายอินเทอร์เน็ต"], answer: 2 },
            { id: 83, q: "กิจกรรมโครงงานกลุ่มย่อยที่ต้องจัดทำและพบปะคุยงานกันเป็นประจำทุกวันศุกร์ของสัปดาห์ ควรเลือกตั้งค่าแบบใดในตาราง", options: ["สร้างนัดหมายแยกส่วนเดี่ยวใหม่ 40 รอบ", "ตั้งค่ากิจกรรมให้ทำซ้ำแบบ รายสัปดาห์ในวันศุกร์ (Weekly on Friday)", "แชร์ปฏิทินให้เป็นข้อมูลสาธารณะและส่งเมลซ้ำตลอดเวลา", "ให้ระบบทำการสุ่มเลือกวันเองอัตโนมัติเมื่อเพื่อนว่าง"], answer: 1 },
            { id: 84, q: "ปุ่มตัวเลือกพิเศษชนิดใดในรายละเอียดตารางงานปฏิทินที่จะช่วยเปิดไฟล์เอกสารสรุปงานใหม่เชื่อมกับนัดหมายอัตโนมัติ", options: ["ปุ่มสร้างบันทึกการประชุม (Create meeting notes)", "ปุ่มส่งอีเมลแจ้งความต้องการพิเศษ", "ปุ่มเพิ่มสไลด์แนะนำตัว", "ปุ่มจัดหมวดหมู่สมุดโทรศัพท์"], answer: 0 },

            { id: 86, q: "นักเรียนสามารถดูความเคลื่อนไหวตารางงานกลุ่มของทีมที่แชร์ร่วมกันในวิชานี้ ได้โดยใช้วิธีการแชร์ข้อมูลข้อใด", options: ["คัดลอกรูปภาพตารางส่งให้อ่านทุกเช้า", "สร้างการเข้าถึงสิทธิ์แชร์ปฏิทินร่วมกัน (Share calendars)", "ลบวันเกิดออกจากฐานข้อมูล", "บันทึกข้อมูลเก็บไว้บนหน้าสไลด์พรีเซนต์งาน"], answer: 1 },
            { id: 87, q: "การแนบข้อมูลประกอบการประชุมล่วงหน้าเพื่อให้ผู้ร่วมเข้าชมสามารถศึกษาข้อมูลได้ก่อนเริ่มงาน สามารถอัปโหลดไฟล์ไปที่เมนูใด", options: ["เพิ่มคำอธิบายหรือไฟล์แนบ (Add description or attachments)", "เพิ่มสถานที่จอดรถ", "เพิ่มห้องกิจกรรมปฏิทินย่อย", "แนบรายชื่อ Contacts ส่วนตัว"], answer: 0 },

            { id: 90, q: "หากครูต้องการสร้างช่วงเวลานัดเปิดจอง เพื่อให้นักเรียนจองเข้ามาปรึกษาโครงงานวิชาคอมพิวเตอร์ ฟีเจอร์ใดตอบโจทย์ที่สุด", options: ["ช่วงเวลาสับหลีกงานสำคัญ", "กำหนดการนัดหมาย (Appointment schedule / slots)", "ระบบจองวันลาเรียนสิบวัน", "ห้องสรุปแผนการเดินทางของรถประจำทาง"], answer: 1 },

            // Google Contacts & General Security (91-100)
            { id: 91, q: "หากต้องการรวบรวมข้อมูลติดต่อและสร้างการทำงานส่งเมลหาเพื่อนกลุ่มโครงงานย่อยเป็นกลุ่มง่ายดาย ควรใช้แอปพลิเคชันใดจัดระเบียบ", options: ["Google Drive", "Google Sheets", "Google Contacts", "Google Docs"], answer: 2 },

            { id: 93, q: "รูปแบบไฟล์และส่วนขยายของเอกสารประเภทใดที่นิยมใช้นำเข้าและส่งออกข้อมูลรายชื่อสมุดโทรศัพท์มาใช้กับ Google Contacts", options: [".docx", ".pptx", ".csv", ".mp4"], answer: 2 },
            { id: 94, q: "ข้อใดคือระบบรักษาความปลอดภัยบัญชีของ Google (Google Account) ที่ช่วยยืนยันและป้องกันการลักลอบแฮกเกอร์เจาะพาสเวิร์ดได้ดีที่สุด", options: ["การจดจำรหัสผ่านลงในเบราว์เซอร์สาธารณะ", "การตั้งระบบการยืนยันตัวตนแบบสองขั้นตอน (2-Step Verification)", "การเขียนรหัสผ่านทิ้งไว้ที่กล่องคำอธิบายของปฏิทิน", "การเปลี่ยนรหัสผ่านทุกชั่วโมงเพื่อความปลอดภัย"], answer: 1 },

            "ชุดที่ 12: [Google Calendar ตั้งเวลา] สร้างกิจกรรมในปฏิทินของวันพรุ่งนี้ เวลา 15.00-16.00 น. ระบุสถานที่ (Location) เป็น 'ห้องคอมพิวเตอร์' และตั้งค่าการแจ้งเตือน (Notification) ล่วงหน้า 2 ครั้ง คือ 1 วัน และ 30 นาที คัดลอกลิงก์แชร์กิจกรรมมาส่ง",
            "ชุดที่ 13: [Google Drive ทางลัด] สร้างไฟล์ Google Docs ชื่อ 'Original_Doc' ไว้ในโฟลเดอร์หลัก จากนั้นสร้างโฟลเดอร์ใหม่ชื่อ 'Shortcut_Folder' แล้วสร้าง 'ทางลัด (Shortcut)' ของไฟล์ Original_Doc ไปไว้ในโฟลเดอร์นั้น ส่งลิงก์ Shortcut_Folder แบบ Viewer",
            "ชุดที่ 14: [Google Slides Design] ให้สร้างสไลด์เนื้อหา 3 หน้า เกี่ยวกับ 'ภาวะโลกร้อน' ตกแต่งด้วยธีมเดียวกัน ใส่ภาพเคลื่อนไหว (Animation) ให้แต่ละองค์ประกอบ และเปลี่ยนหน้าแบบหมุนเวียน ส่งลิงก์แบบผู้มีสิทธิ์อ่าน",
            "ชุดที่ 15: [Gmail Settings - ภาพถ่าย] เนื่องจากส่งลิงก์ Gmail ไม่ได้ ให้สร้างเอกสาร Docs แทรกภาพหน้าจอ (Screenshot) 2 ภาพ: 1) ภาพการตั้งค่าลายเซ็น (Signature) ท้ายอีเมลของตนเอง 2) ภาพการสร้างป้ายกำกับ (Label) แยกหมวดหมู่อีเมล ส่งลิงก์ไฟล์ Docs นี้",
            "ชุดที่ 16: [Google Docs ประวัติ] สร้างไฟล์ Docs พิมพ์ชื่อ-สกุลตนเอง จากนั้นแก้ไขสีข้อความและฟอนต์ 3 ครั้ง (เว้นระยะเวลาเล็กน้อย) ไปที่เมนู 'ประวัติเวอร์ชัน (Version history)' ตั้งชื่อเวอร์ชันสุดท้ายว่า 'Final_Version' ส่งลิงก์เอกสารให้ครูเป็น 'เอดิเตอร์'",

            "ชุดที่ 18: [Google Docs สารบัญ] สร้างเอกสารรายงานที่มีหัวข้อหลัก (Heading 1) 3 หัวข้อ และหัวข้อย่อย (Heading 2) 3 หัวข้อ (กระจายอยู่ 2-3 หน้า) จากนั้นแทรก 'สารบัญ (Table of Contents)' ไว้ที่หน้าแรกสุดของเอกสาร ตั้งค่าแชร์แบบ Viewer แล้วส่งลิงก์",

            "ชุดที่ 20: [Google Drive กู้คืน] สร้างไฟล์ Docs ชื่อ 'Delete_Me' ลบทิ้งลงถังขยะ จากนั้นไปกู้คืน (Restore) กลับมา เปลี่ยนชื่อไฟล์ใหม่เป็น 'Restored_Doc' พิมพ์อธิบายวิธีการกู้คืนลงไปในไฟล์นั้น ตั้งค่าแชร์ทุกคนเป็น Viewer แล้วส่งลิงก์"
        ];

        // ฟังก์ชันสุ่มอาเรย์ (Fisher-Yates)
        const shuffleArray = (array) => {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        // ครูสามารถนำ URL ของ Web App จาก Google Apps Script มาใส่ที่นี่เพื่อจัดเก็บข้อมูล
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx-XcaTNUPFCtTP_aaQXQqaKKNrzfwtI9lwXq0Sn8WqtVdsSNmbL0y_vHAKwa8jQP8/exec';

        const App = () => {
            const [step, setStep] = useState('login'); // login, exam, success
            const [studentData, setStudentData] = useState({ name: '', number: '', room: '', password: '', subject: 'google_edu' });
            const [errorMsg, setErrorMsg] = useState('');
            
            // จัดการรหัสผ่านแยกตามห้อง
            const [passwords, setPasswords] = useState({});
            const [isLoadingConfig, setIsLoadingConfig] = useState(true);

            // สถานะข้อมูลการสอบที่พร้อมสอบ
            const [examType, setExamType] = useState(''); // theory, practical
            const [mcqQuestions, setMcqQuestions] = useState([]);
            const [subjectiveQuestions, setSubjectiveQuestions] = useState([]);
            const [practicalQuestion, setPracticalQuestion] = useState('');
            
            // สถานะการเก็บคำตอบ
            const [mcqAnswers, setMcqAnswers] = useState({});
            const [subjAnswers, setSubjAnswers] = useState({});
            const [practAnswer, setPractAnswer] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            const theoryRooms = ['1', '4', '6', '7', '8', '9', '11'];
            const practicalRooms = ['2', '3', '5', '10'];

            // โหลดรหัสผ่านจาก Google Sheet เมื่อเปิดระบบ
            useEffect(() => {
                const fetchPasswords = async () => {
                    if (scriptURL === 'YOUR_GOOGLE_SCRIPT_URL_HERE' || !scriptURL) {
                        // จำลองรหัสผ่านหากไม่ได้ต่อ Google Sheet (ใช้ 1234 ทุกห้อง)
                        const mockPasswords = {};
                        [...theoryRooms, ...practicalRooms].forEach(room => mockPasswords[room] = '1234');
                        setPasswords(mockPasswords);
                        setIsLoadingConfig(false);
                        return;
                    }

                    try {
                        const response = await fetch(scriptURL + '?action=getPasswords');
                        const data = await response.json();
                        setPasswords(data);
                    } catch (error) {
                        console.error('Error fetching passwords:', error);
                        // หากมีปัญหาการดึงข้อมูลจากเครือข่าย ให้ตั้งค่ารหัสเริ่มต้นเพื่อไม่ให้ระบบล็อก
                        const mockPasswords = {};
                        [...theoryRooms, ...practicalRooms].forEach(room => mockPasswords[room] = '1234');
                        setPasswords(mockPasswords);
                    }
                    setIsLoadingConfig(false);
                };
                fetchPasswords();
            }, []);

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                if (!studentData.name || !studentData.number || !studentData.room || !studentData.password || !studentData.subject) {
                    setErrorMsg('กรุณากรอกข้อมูลและเลือกวิชาให้ครบถ้วน');
                    return;
                }
                
                // ตรวจสอบรหัสผ่านของห้องเรียน
                const correctPassword = passwords[studentData.room];
                if (!correctPassword) {
                    setErrorMsg(`ไม่มีข้อมูลรหัสผ่านของ ม.6/${studentData.room} ในฐานข้อมูล`);
                    return;
                }
                
                if (studentData.password !== correctPassword.toString()) {
                    setErrorMsg(`รหัสผ่านเข้าสอบห้อง ม.6/${studentData.room} ไม่ถูกต้อง`);
                    return;
                }

                setErrorMsg('');
                
                // ==========================================
                // จัดชุดข้อสอบสำหรับวิชาที่เลือก
                // ==========================================
                if (studentData.subject === 'google_edu') {
                    // วิชา 1: Google for Education
                    if (theoryRooms.includes(studentData.room)) {
                        setExamType('theory');
                        // สุ่มดึงปรนัย 30 ข้อ จากคลัง 100 ข้อ และสุ่มตัวเลือกในแต่ละข้อ
                        const randomMcqs = shuffleArray(mcqPoolGoogle).slice(0, 30);
                        const shuffledQs = randomMcqs.map(q => {
                            const optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
                            const shuffledOptions = shuffleArray(optionsWithIndex);
                            return { ...q, options: shuffledOptions };
                        });
                        setMcqQuestions(shuffledQs);

                        // สุ่มดึงอัตนัย 5 ข้อ จากคลัง 20 ข้อ
                        const randomSubjectives = shuffleArray(subjectivePoolGoogle).slice(0, 5);
                        setSubjectiveQuestions(randomSubjectives);
                    } else if (practicalRooms.includes(studentData.room)) {
                        setExamType('practical');
                        // สุ่มโจทย์ปฏิบัติ 1 ข้อ
                        const randomSet = practicalPool[Math.floor(Math.random() * practicalPool.length)];
                        setPracticalQuestion(randomSet);
                    }
                } else if (studentData.subject === 'ai_critical') {
                    // วิชา 2: AI และการคิดวิเคราะห์
                    // ทุกห้องสอบทฤษฎีเดียวกัน: ปรนัยสุ่ม 40 ข้อ (จาก 40 ข้อ) + อัตนัยทั้งหมด 5 ข้อ
                    setExamType('theory');
                    
                    // สุ่มการเรียงลำดับและตัวเลือกของปรนัยทั้ง 40 ข้อ
                    const shuffledAllMcqs = shuffleArray(mcqPoolAI).map(q => {
                        const optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, originalIndex: idx }));
                        const shuffledOptions = shuffleArray(optionsWithIndex);
                        return { ...q, options: shuffledOptions };
                    });
                    setMcqQuestions(shuffledAllMcqs);

                    // ดึงข้อเขียนอัตนัยออกมาหมดทั้ง 5 ข้อตามเงื่อนไขคุณครู
                    setSubjectiveQuestions(subjectivePoolAI);
                }

                setStep('exam');
            };

            const submitExam = async () => {
                setIsSubmitting(true);
                let score = 0;
                
                // คำนวณคะแนนปรนัยเบื้องต้น
                if (examType === 'theory') {
                    mcqQuestions.forEach(q => {
                        if (mcqAnswers[q.id] === q.answer) score += 1;
                    });
                }

                const payload = {
                    name: studentData.name,
                    number: studentData.number,
                    room: studentData.room,
                    subject: studentData.subject === 'google_edu' ? 'Google for Education' : 'AI และการคิดวิเคราะห์',
                    examType: examType,
                    mcqScore: score, 
                    mcqAnswers: JSON.stringify(mcqAnswers),
                    subjAnswers: JSON.stringify(subjAnswers),
                    practAnswer: practAnswer,
                    timestamp: new Date().toISOString()
                };

                try {
                    console.log("Submitting payload:", payload);
                    
                    if (scriptURL !== 'YOUR_GOOGLE_SCRIPT_URL_HERE') {
                        await fetch(scriptURL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }
                    
                    await new Promise(r => setTimeout(r, 1500));
                    setStep('success');
                } catch (error) {
                    console.error('Error submitting exam:', error);
                    alert('เกิดข้อผิดพลาดในการเชื่อมต่อเพื่อส่งข้อสอบ ค้างหน้านี้เก็บไว้และแจ้งคุณครูเพื่อตรวจสอบ');
                }
                setIsSubmitting(false);
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <div className="bg-google-blue text-white py-6 px-4 shadow-md">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold">สอบกลางภาคชั้น ม.6</h1>
                                <p className="mt-1 text-md md:text-lg opacity-90">โรงเรียนธาตุพนม | ผู้สอน: ครูกุลดา ดาวทอง</p>
                            </div>
                            <span className="bg-white/20 text-white px-3 py-1 rounded-full text-sm font-medium">
                                มิดเทอม 2569
                            </span>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto mt-8 px-4">
                        {step === 'login' && (
                            <div className="bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-8 border-emerald-600">
                                <h2 className="text-2xl font-semibold mb-6 text-gray-800 flex items-center gap-2">
                                    <svg className="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                    ลงทะเบียนเข้าห้องสอบ
                                </h2>
                                <form onSubmit={handleLoginSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-gray-700 font-medium mb-2">เลือกวิชาที่ต้องการสอบ</label>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            <label className={`p-4 border-2 rounded-lg cursor-pointer transition flex items-center justify-between ${studentData.subject === 'google_edu' ? 'border-emerald-600 bg-emerald-50 text-emerald-900' : 'border-gray-200 hover:bg-gray-50 text-gray-700'}`}>
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-md">คอมพิวเตอร์ Google for Education</span>
                                                    <span className="text-xs opacity-75">รหัสวิชา ว30280</span>
                                                </div>
                                                <input type="radio" name="subject" value="google_edu" 
                                                    checked={studentData.subject === 'google_edu'}
                                                    onChange={() => setStudentData({...studentData, subject: 'google_edu'})}
                                                    className="w-4 h-4 text-emerald-600"
                                                />
                                            </label>
                                            <label className={`p-4 border-2 rounded-lg cursor-pointer transition flex items-center justify-between ${studentData.subject === 'ai_critical' ? 'border-emerald-600 bg-emerald-50 text-emerald-900' : 'border-gray-200 hover:bg-gray-50 text-gray-700'}`}>
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-md">AI และการคิดวิเคราะห์</span>
                                                    <span className="text-xs opacity-75">ปรนัย 40 ข้อ + เขียนอัตนัย 5 ข้อ</span>
                                                </div>
                                                <input type="radio" name="subject" value="ai_critical" 
                                                    checked={studentData.subject === 'ai_critical'}
                                                    onChange={() => setStudentData({...studentData, subject: 'ai_critical'})}
                                                    className="w-4 h-4 text-emerald-600"
                                                />
                                            </label>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">ชื่อ - นามสกุล</label>
                                            <input type="text" required
                                                className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                value={studentData.name}
                                                onChange={e => setStudentData({...studentData, name: e.target.value})}
                                                placeholder="เด็กชาย / เด็กหญิง / นาย / นางสาว"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">เลขที่</label>
                                            <input type="number" required min="1" max="50"
                                                className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                value={studentData.number}
                                                onChange={e => setStudentData({...studentData, number: e.target.value})}
                                                placeholder="ระบุเลขที่ของตนเอง"
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">ระดับชั้นห้องเรียน</label>
                                            <select required
                                                className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                value={studentData.room}
                                                onChange={e => setStudentData({...studentData, room: e.target.value})}
                                            >
                                                <option value="">-- เลือกห้องเรียน --</option>
                                                <option value="1">ม.6/1</option>
                                                <option value="2">ม.6/2</option>
                                                <option value="3">ม.6/3</option>
                                                <option value="4">ม.6/4</option>
                                                <option value="5">ม.6/5</option>
                                                <option value="6">ม.6/6</option>
                                                <option value="7">ม.6/7</option>
                                                <option value="8">ม.6/8</option>
                                                <option value="9">ม.6/9</option>
                                                <option value="10">ม.6/10</option>
                                                <option value="11">ม.6/11</option>
                                            </select>
                                        </div>
                                        {studentData.room && (
                                            <div>
                                                <label className="block text-gray-700 font-medium mb-2">รหัสผ่านเข้าสอบรายห้อง</label>
                                                <input type="password" required
                                                    className="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                                    value={studentData.password}
                                                    onChange={e => setStudentData({...studentData, password: e.target.value})}
                                                    placeholder="กรอกรหัสผ่านจากครู"
                                                />
                                            </div>
                                        )}
                                    </div>
                                    
                                    {errorMsg && (
                                        <div className="bg-red-50 text-red-700 p-3 rounded-md border border-red-200">
                                            {errorMsg}
                                        </div>
                                    )}
                                    
                                    <button type="submit" 
                                        disabled={isLoadingConfig}
                                        className={`w-full text-white font-bold py-3 px-4 rounded-md transition duration-300 ${isLoadingConfig ? 'bg-gray-400 cursor-not-allowed' : 'bg-google-blue'}`}>
                                        {isLoadingConfig ? 'กำลังโหลดฐานข้อมูลรหัสผ่าน...' : 'ยืนยันและเปิดข้อสอบ'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {step === 'exam' && (
                            <div className="space-y-6">
                                {/* แถบข้อมูลนักเรียน */}
                                <div className="bg-white p-4 rounded-lg shadow border-l-4 border-emerald-600 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                    <div>
                                        <p className="font-semibold text-gray-800 text-md md:text-lg">
                                            ผู้เข้าสอบ: {studentData.name} | เลขที่: {studentData.number} | ชั้น: ม.6/{studentData.room}
                                        </p>
                                        <p className="text-gray-500 text-sm font-medium mt-1">
                                            รายวิชา: {studentData.subject === 'google_edu' ? 'คอมพิวเตอร์ Google for Education' : 'AI และการคิดวิเคราะห์'}
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => {
                                            if(window.confirm('คำตอบของคุณทั้งหมดจะยังไม่หายไป คุณแน่ใจที่จะย้อนกลับไปแก้ไขข้อมูลส่วนตัวใช่หรือไม่')) {
                                                setStep('login');
                                            }
                                        }}
                                        className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-1.5 px-4 rounded transition text-sm"
                                    >
                                        ย้อนกลับหน้าลงชื่อ
                                    </button>
                                </div>

                                {/* กรณีทำข้อสอบทฤษฎี (แบบเลือกตอบ + เขียนตอบ) */}
                                {examType === 'theory' && (
                                    <>
                                        {/* ปรนัย */}
                                        <div className="bg-white p-6 rounded-xl shadow-lg border-t-8 border-purple-600">
                                            <h2 className="text-xl font-bold mb-2 text-purple-700">
                                                ตอนที่ 1: ปรนัย 4 ตัวเลือก ({studentData.subject === 'google_edu' ? 'สุ่มดึง 30 ข้อ' : 'สุ่มดึงและจัดหน้า 40 ข้อ'})
                                            </h2>
                                            <p className="text-gray-500 text-sm mb-6">คลิกเลือกคำตอบที่ถูกต้องที่สุดเพียงข้อเดียวจากหน้าข้อสอบต่อไปนี้</p>
                                            
                                            {mcqQuestions.map((q, index) => (
                                                <div key={q.id} className="mb-6 pb-6 border-b border-gray-100 last:border-0">
                                                    <p className="font-medium text-lg mb-3 text-gray-900">{index + 1}. {q.q}</p>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2.5">
                                                        {q.options.map((opt, optIdx) => (
                                                            <label key={optIdx} className="flex items-center space-x-3 p-3.5 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                                                <input type="radio" 
                                                                    name={`q_${q.id}`} 
                                                                    value={opt.originalIndex}
                                                                    onChange={() => setMcqAnswers({...mcqAnswers, [q.id]: opt.originalIndex})}
                                                                    className="w-4 h-4 text-emerald-600 focus:ring-emerald-500"
                                                                />
                                                                <span className="text-gray-700">{opt.text}</span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        {/* อัตนัย */}
                                        <div className="bg-white p-6 rounded-xl shadow-lg border-t-8 border-indigo-600">
                                            <h2 className="text-xl font-bold mb-2 text-indigo-700">
                                                ตอนที่ 2: อัตนัย ({studentData.subject === 'google_edu' ? 'สุ่มทำ 5 ข้อ' : 'ข้อเขียนวิเคราะห์ ทั้งหมด 5 ข้อ'})
                                            </h2>
                                            <p className="text-gray-500 text-sm mb-6">กรุณาพิมพ์เขียนอธิบายตอบคำถามด้วยการวิเคราะห์เชิงวิชาการให้สมเหตุสมผล</p>
                                            
                                            {subjectiveQuestions.map((q, index) => (
                                                <div key={index} className="mb-6">
                                                    <p className="font-semibold text-lg text-gray-900 mb-3 leading-relaxed">{q}</p>
                                                    <textarea 
                                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800"
                                                        rows="4"
                                                        placeholder="พิมพ์คำตอบของคุณและอธิบายให้ละเอียดพร้อมตัวอย่างลงในช่องว่างนี้..."
                                                        onChange={(e) => setSubjAnswers({...subjAnswers, [index]: e.target.value})}
                                                    ></textarea>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}

                                {/* กรณีทำข้อสอบปฏิบัติ (เฉพาะคอมพิวเตอร์ Google for Education) */}
                                {examType === 'practical' && (
                                    <div className="bg-white p-6 rounded-xl shadow-lg border-t-8 border-pink-500">
                                        <h2 className="text-xl font-bold mb-2 text-pink-700">ข้อสอบปฏิบัติ</h2>
                                        <p className="text-gray-500 text-sm mb-6">โปรดเปิดหน้าโปรแกรม Google หรือบริการที่โจทย์ระบุเพื่อทำผลงานตามรายละเอียดแล้วนำลิงก์ผลงานมาส่ง</p>
                                        
                                        <div className="bg-pink-50 p-4 rounded-md mb-6 border border-pink-200">
                                            <p className="text-lg font-bold mb-2 text-pink-900">คำชี้แจงการสอบ:</p>
                                            <p className="text-gray-800 text-lg leading-relaxed">{practicalQuestion}</p>
                                        </div>
                                        <div>
                                            <label className="block text-gray-700 font-medium mb-2">ลิงก์ส่งงาน (เช่น Google Drive Folder URL หรือ Google Docs Share Link)</label>
                                            <input type="url" 
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500 text-md"
                                                placeholder="วางลิงก์ความยาวเต็มรูปแบบของคุณที่นี่..."
                                                value={practAnswer}
                                                onChange={e => setPractAnswer(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                )}

                                {/* ปุ่มส่งข้อสอบ */}
                                <div className="flex justify-end mt-8">
                                    <button 
                                        onClick={() => {
                                            if(window.confirm('คุณตรวจสอบความเรียบร้อยและต้องการกดยืนยันการส่งกระดาษคำตอบใช่หรือไม่')) {
                                                submitExam();
                                            }
                                        }}
                                        disabled={isSubmitting}
                                        className={`px-8 py-4 rounded-lg text-white font-bold text-lg shadow-md transition ${isSubmitting ? 'bg-gray-400 cursor-not-allowed' : 'bg-google-blue'}`}
                                    >
                                        {isSubmitting ? 'กำลังบันทึกกระดาษคำตอบเข้าสู่คลาวด์...' : 'ส่งกระดาษคำตอบ'}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="bg-white p-10 rounded-xl shadow-lg text-center border-t-8 border-green-500">
                                <svg className="w-20 h-20 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <h2 className="text-3xl font-bold text-gray-800 mb-4">ส่งข้อสอบเรียบร้อยแล้ว</h2>
                                <p className="text-lg text-gray-600 mb-6">ระบบได้บันทึกคำตอบของ {studentData.name} ลงในฐานข้อมูลของครูกุลดาเป็นที่เรียบร้อยแล้ว</p>
                                <p className="text-md text-gray-500 mb-8">ขอให้โชคดีกับคะแนนสอบ</p>
                                
                                <button 
                                    onClick={() => {
                                        setStudentData({ name: '', number: '', room: '', password: '', subject: 'google_edu' });
                                        setMcqAnswers({});
                                        setSubjAnswers({});
                                        setPractAnswer('');
                                        setStep('login');
                                    }}
                                    className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2.5 px-6 rounded-md transition"
                                >
                                    กลับหน้าแรก (สำหรับนักเรียนคนต่อไป)
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
